app = 'nottennis'
primary_region = 'arn'

[build]

[env]
  PORT = '8080'
  DB_PATH = '/data/nottennis.db'

[mounts]
  source = 'nottennis_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
