dbs:
  - path: /data/openpadel.db
    replicas:
      - type: s3
        bucket: ${BUCKET_NAME}
        path: openpadel.db
        endpoint: ${AWS_ENDPOINT_URL_S3}
        access-key-id: ${AWS_ACCESS_KEY_ID}
        secret-access-key: ${AWS_SECRET_ACCESS_KEY}
        region: auto
        force-path-style: true
